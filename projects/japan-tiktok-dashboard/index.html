<!doctype html> 
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨境電商銷售與庫存管理儀表板｜李庭葦作品集</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #0d1220;
      }

      .portfolio-bar {
        height: 52px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        padding: 0 20px;
        color: #f4b400;
        background: #0d1220;
        border-bottom: 1px solid rgba(244, 180, 0, 0.35);
        font-size: 15px;
        font-weight: 700;
        white-space: nowrap;
      }

      .portfolio-bar a {
        color: inherit;
        text-decoration: none;
      }

      .portfolio-bar a:hover,
      .portfolio-bar a:focus-visible {
        color: #ffd45e;
        text-decoration: underline;
        text-underline-offset: 4px;
      }

      .divider {
        width: 1px;
        height: 18px;
        background: rgba(244, 180, 0, 0.55);
      }

      .portfolio-bar p {
        margin: 0;
      }

      iframe {
        display: block;
        width: 100%;
        height: calc(100vh - 52px);
        border: 0;
        background: #080719;
      }

      @media (max-width: 720px) {
        .portfolio-bar {
          height: 68px;
          flex-direction: column;
          gap: 2px;
          padding: 8px 12px;
          font-size: 12px;
          line-height: 1.45;
          white-space: normal;
          text-align: center;
        }

        .divider {
          display: none;
        }

        iframe {
          height: calc(100vh - 68px);
        }
      }
    </style>
  </head>
  <body>
    <header class="portfolio-bar">
      <a href="../../#projects">← 返回 李庭葦 作品集首頁</a>
      <span class="divider" aria-hidden="true"></span>
      <p>本頁為求職作品集展示，內容皆為模擬資料</p>
    </header>
    <iframe
      src="https://japan-tiktok-sales-portfolio.fphzf6mqj9.chatgpt.site/"
      title="跨境電商銷售與庫存管理儀表板"
      loading="eager"
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
  </body>
</html>
